{% extends 'core/base.html' %}

{% block title %}Customer Login{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow mt-5">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">
                        <i class="bi bi-person-raised-hand"></i> Customer Login
                    </h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" id="id_username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" id="id_password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    {% if form.errors %}
                    <div class="alert alert-danger mt-3">
                        Invalid username or password.
                    </div>
                    {% endif %}
                    <p class="text-center mt-3">
                        New customer? <a href="{% url 'customer_register' %}">Register here</a>
                    </p>
                    <hr>
                    <p class="text-center">
                        <a href="{% url 'provider_login' %}">Provider Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
